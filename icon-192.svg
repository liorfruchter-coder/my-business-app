<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1668D0"/>
      <stop offset="100%" style="stop-color:#0F4FA8"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>
  <rect width="192" height="96" rx="40" fill="url(#shine)"/>
  <!-- Building -->
  <rect x="56" y="80" width="80" height="72" rx="4" fill="rgba(255,255,255,0.15)"/>
  <rect x="64" y="72" width="64" height="80" rx="4" fill="rgba(255,255,255,0.22)"/>
  <!-- Windows -->
  <rect x="72" y="84" width="14" height="12" rx="2" fill="rgba(255,255,255,0.85)"/>
  <rect x="92" y="84" width="14" height="12" rx="2" fill="rgba(255,255,255,0.85)"/>
  <rect x="112" y="84" width="8" height="12" rx="2" fill="rgba(255,255,255,0.85)"/>
  <rect x="72" y="102" width="14" height="12" rx="2" fill="rgba(255,255,255,0.6)"/>
  <rect x="92" y="102" width="14" height="12" rx="2" fill="rgba(255,255,255,0.85)"/>
  <rect x="112" y="102" width="8" height="12" rx="2" fill="rgba(255,255,255,0.6)"/>
  <!-- Door -->
  <rect x="88" y="128" width="16" height="24" rx="2" fill="rgba(255,255,255,0.9)"/>
  <!-- Chart bars (bottom right) -->
  <rect x="118" y="118" width="8" height="18" rx="2" fill="rgba(255,255,255,0.7)"/>
  <rect x="130" y="110" width="8" height="26" rx="2" fill="rgba(255,255,255,0.9)"/>
  <!-- Upward arrow -->
  <polyline points="118,96 126,84 134,90" stroke="rgba(255,255,255,0.95)" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="134,86 138,94 130,92" fill="rgba(255,255,255,0.95)"/>
</svg>
